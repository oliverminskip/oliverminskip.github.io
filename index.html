    const existingKey = `savings_${p.id}`;
    if (charts[existingKey]) charts[existingKey].destroy();

    const targetLine = Array(labels.length).fill(p.target);
    const hasExtrapolation = labels.length > cfPointCount;

    // RAG colours
    const COL_RED   = '#ff5470';
    const COL_AMBER = '#f0a732';
    const COL_GREEN = '#22d47e';
    const FILL_RED   = 'rgba(255,84,112,0.10)';
    const FILL_GREEN = 'rgba(34,212,126,0.12)';

    // For each data point: is the principal at or above target?
    // We use this in segment callbacks to colour the line RAG.
    const aboveTarget = principal.map(v => v >= p.target);

    // Determine overall RAG status for the pot
    const finalVal = principal[principal.length - 1] || 0;
    const hitsTarget = principal.some(v => v >= p.target);
    const ragColor = finalVal >= p.target ? COL_GREEN
                   : hitsTarget           ? COL_AMBER
                   :                        COL_RED;

    // Helper: interpolate crossing point fraction between two data points
    const crossFrac = (v0, v1, tgt) => (tgt - v0) / (v1 - v0);

    const datasets = [
      {
        label: 'Principal',
        data: principal,
        borderColor: ragColor,
        backgroundColor: FILL_RED,
        borderWidth: 2.5,
        pointRadius: 0,
        tension: 0.3,
        fill: true,
        segment: {
          // Line colour: green once above target, red below; faded+dashed in extrapolation
          borderColor: ctx => {
            const isExtra = ctx.p0DataIndex >= cfPointCount - 1;
            const above   = aboveTarget[ctx.p0DataIndex];
            const base    = above ? COL_GREEN : COL_RED;
            return isExtra ? base + '77' : base;
          },
          borderDash: ctx => ctx.p0DataIndex >= cfPointCount - 1 ? [5, 4] : undefined,
          // Fill: green above target, red below
          backgroundColor: ctx => aboveTarget[ctx.p0DataIndex] ? FILL_GREEN : FILL_RED,
        },
      }
    ];

    if (hasInterest){
      datasets.push({
        label: 'With Interest',
        data: withInterest,
        borderColor: COL_GREEN,
        backgroundColor: 'transparent',
        borderWidth: 1.5,
        pointRadius: 0,
        tension: 0.3,
        fill: false,
        segment: {
          borderDash: ctx => ctx.p0DataIndex >= cfPointCount - 1 ? [2, 5] : [4, 3],
          borderColor: ctx => ctx.p0DataIndex >= cfPointCount - 1 ? COL_GREEN + '55' : COL_GREEN,
        },
      });
    }

    // Prominent target line
    datasets.push({
      label: 'Target',
      data: targetLine,
      borderColor: 'rgba(255,255,255,0.55)',
      borderWidth: 2,
      pointRadius: 0,
      fill: false,
      borderDash: [6, 3],
      order: 0, // draw on top
    });

    charts[existingKey] = new Chart(canvas.getContext('2d'), {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode:'index', intersect:false },
        plugins: {
          legend: {
            display: true,
            position: 'bottom',
            labels: {
              boxWidth: 8, font:{size:9}, color: cssVar('--chart-tick'), padding:8,
              filter: item => item.text !== 'Principal' || hasInterest // hide Principal label when no interest
            }
          },
          tooltip: {
            callbacks: {
              label: ctx => `${ctx.dataset.label}: ${fmt(ctx.raw)}`,
              afterBody: ctx => {
                const v = ctx[0]?.raw;
                if (v === undefined) return '';
                if (v >= p.target) return '✅ Above target';
                const gap = p.target - v;
                return `${fmt(gap)} to go`;
              }
            }
          }
        },
        scales: {
          x: {
            grid: { color: cssVar('--chart-grid') },
            ticks: { color: cssVar('--chart-tick'), font:{size:8}, maxTicksLimit:6 }
          },
          y: {
            min: 0,
            grid: { color: cssVar('--chart-grid') },
            ticks: {
              color: cssVar('--chart-tick'),
              font: {size:8},
              callback: v => v >= 1000 ? '£'+Math.round(v/1000)+'k' : '£'+v
            }
          }
        }
      }
    });
  });
}

/* ==========================================================================
   DEBT — SMART SNOWBALL ENGINE
   ========================================================================== */

/*
  getMonthlyDebtBudget()
  ──────────────────────
  Reads the creditCard CF total for the next 3 scheduled months and averages
  them. Falls back to S.debtBudgetOverride if the user has manually set one.
*/
function getMonthlyDebtBudget(){
  if (S.debtBudgetOverride && S.debtBudgetOverride > 0) return S.debtBudgetOverride;
  const flow = getFlow();
  const totals = [0,1,2].map(i => {
    const mStart = addMonths(today, i);
    const mEnd   = addMonths(today, i+1);
    return flow.filter(r => r.dateObj >= mStart && r.dateObj < mEnd)
               .reduce((s,r) => s + (r.cols.creditCard||0), 0);
  }).filter(v => v > 0);
  if (totals.length === 0) return S.debtCards.reduce((s,c)=>s+(c.standardPayment||c.minPayment||10),0);
  return +(totals.reduce((a,b)=>a+b,0) / totals.length).toFixed(2);
}

/*
  runSnowball(budget, cards)
  ──────────────────────────
  Full month-by-month snowball simulation.

  Rules (in priority order each month):
  1. Pay minimum on every active card.
  2. For any card with a 0% deadline, check if current balance ÷ months remaining
     requires MORE than the minimum — if so, top it up to that required amount.
     (0% protection always wins over snowball allocation.)
  3. Any remaining budget after minimums + 0%-protection top-ups goes to the
     smallest non-zero balance card (snowball attack card).
  4. When a card hits zero, its payment cascades into the next attack card.

  Returns array of monthly snapshots:
  { month, date, budgetUsed, allocations:{cardId→amount}, balances:{cardId→bal}, cleared:[cardId] }
*/
function runSnowball(budget, cards){
  if (!cards.length || budget <= 0) return [];

  // Deep-copy balances
  let balances = {};
  cards.forEach(c => { balances[c.id] = +c.balance.toFixed(2); });

  const months = [];
  const MAX_MONTHS = 360;
  const startMonth = 1; // current month already paid, start from next

  // ── Calculate attack order ONCE upfront ──
  // Use the card's stored standard payment if set (above the minimum), else the minimum.
  // No arbitrary £50 floor — respect whatever the user has configured.
  const getEffectiveMin = c => {
    const min = c.minPayment > 0 ? c.minPayment : 10;
    const std = c.standardPayment && c.standardPayment > min ? c.standardPayment : min;
    return std;
  };
  const strategy = S.debtStrategy || 'snowball';

  let ATTACK_ORDER;
  if (strategy === 'avalanche'){
    ATTACK_ORDER = [...cards].sort((a,b) => (b.apr||0) - (a.apr||0));
  } else {
    // Snowball: earliest 0% deadline first, then smallest balance
    const dealCards   = cards.filter(c => c.zeroEndDate).sort((a,b) => parseDate(a.zeroEndDate) - parseDate(b.zeroEndDate));
    const noDealCards = cards.filter(c => !c.zeroEndDate).sort((a,b) => a.balance - b.balance);
    ATTACK_ORDER = [...dealCards, ...noDealCards];
  }

  for (let m = startMonth; m < MAX_MONTHS + startMonth; m++){
    const activeCards = cards.filter(c => balances[c.id] > 0.005);
    if (!activeCards.length) break;

    const monthDate = addMonths(today, m);
    const alloc = {};
    cards.forEach(c => { alloc[c.id] = 0; });
    let pot = +budget.toFixed(2);

    // ── Step 1: Minimums on all active cards ──
    activeCards.forEach(c => {
      const min       = +Math.min(getEffectiveMin(c), balances[c.id]).toFixed(2);
      alloc[c.id]     = min;
      pot             = +(pot - min).toFixed(2);
    });

    // ── Step 2: Pour ALL surplus into attack order (fixed upfront) ──
    // Only cascade to next card if current attack card is fully cleared
    if (pot > 0.005){
      for (const target of ATTACK_ORDER){
        if (pot <= 0.005) break;
        if (balances[target.id] <= 0.005) continue; // already cleared
        const space = +Math.max(0, balances[target.id] - alloc[target.id]).toFixed(2);
        if (space <= 0) continue;
        const give       = +Math.min(pot, space).toFixed(2);
        alloc[target.id] = +(alloc[target.id] + give).toFixed(2);
        pot              = +(pot - give).toFixed(2);
        // Only cascade if fully cleared this month
        if (alloc[target.id] < balances[target.id] - 0.005) break;
      }
    }

    // ── Apply payments ──
    const cleared = [];
    const newBalances = {};
    cards.forEach(c => {
      const pay         = +Math.min(alloc[c.id], balances[c.id]).toFixed(2);
      alloc[c.id]       = pay;
      newBalances[c.id] = +Math.max(0, balances[c.id] - pay).toFixed(2);
      if (newBalances[c.id] < 0.01 && pay > 0){ newBalances[c.id] = 0; cleared.push(c.id); }
    });
    balances = newBalances;

    const budgetUsed = +cards.reduce((s, c) => +(s + alloc[c.id]).toFixed(2), 0).toFixed(2);
    months.push({ month:m, date:monthDate, budgetUsed, allocations:{...alloc}, balances:{...balances}, cleared });
  }
  return months;
}

function renderDebt(){
  const el = document.getElementById('page-debt');

  // Migrate: ensure debtBudgetOverride exists
  if (!S.hasOwnProperty('debtBudgetOverride')) S.debtBudgetOverride = null;

  const budget      = getMonthlyDebtBudget();
  const cfDerived   = !S.debtBudgetOverride;
  const cards = [
    ...S.debtCards.filter(c => c.zeroEndDate).sort((a,b) => parseDate(a.zeroEndDate) - parseDate(b.zeroEndDate)),
    ...S.debtCards.filter(c => !c.zeroEndDate).sort((a,b) => a.balance - b.balance)
  ];
  const strategy = S.debtStrategy || 'snowball';
  const totalDebt   = cards.reduce((s,c)=>s+c.balance,0);
  const totalMin    = cards.reduce((s,c)=>s+(c.minPayment||10),0);
  const totalStd    = cards.reduce((s,c)=>s+(c.standardPayment||c.minPayment||10),0);

  // Run the engine
  const plan = runSnowball(budget, cards);
  const freedMonth = plan.length ? plan[plan.length-1] : null;
  const dfDate = freedMonth ? addMonths(today, freedMonth.month+1) : null;
  const daysLeft = dfDate ? Math.ceil((dfDate-today)/86400000) : null;

  // Find when each card clears
  const clearMonth = {}; // cardId → month index
  plan.forEach(snap => {
    snap.cleared.forEach(id => { if(!clearMonth.hasOwnProperty(id)) clearMonth[id] = snap.month; });
  });

  el.innerHTML = `
<div class="sh">
  <div><h2>💳 Debt ${strategy==='avalanche'?'Avalanche':'Snowball'}</h2><p>${strategy==='avalanche'?'Highest APR first':'Earliest deadline first'} · auto-allocated · cascading</p></div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <div style="display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:6px;overflow:hidden">
      <button class="btn btn-sm" style="border-radius:0;border:none;background:${strategy==='snowball'?'var(--accent)':'transparent'};color:${strategy==='snowball'?'#fff':'var(--text2)'}" onclick="setDebtStrategy('snowball')">❄️ Snowball</button>
      <button class="btn btn-sm" style="border-radius:0;border:none;background:${strategy==='avalanche'?'var(--accent)':'transparent'};color:${strategy==='avalanche'?'#fff':'var(--text2)'}" onclick="setDebtStrategy('avalanche')">🔥 Avalanche</button>
    </div>
    <button class="btn btn-primary btn-sm" onclick="openDebtModal()">＋ Add Card</button>
  </div>
</div>

<div class="g4" style="margin-bottom:14px">
  <div class="card">
    <div class="kpi-label">Total Remaining</div>
    <div class="kpi-value c-red">${fmt(totalDebt)}</div>
    <div class="kpi-sub">${cards.length} cards</div>
  </div>
  <div class="card">
    <div class="kpi-label">Monthly Budget</div>
    <div class="kpi-value">${fmt(budget)}</div>
    <div class="kpi-sub" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      <span>${cfDerived ? '⚡ From cash flow' : '✏️ Manual override'}</span>
      <button class="btn btn-ghost btn-sm" style="padding:2px 7px;font-size:10px" onclick="openBudgetOverrideModal()">
        ${cfDerived ? 'Override' : 'Reset to CF'}
      </button>
    </div>
  </div>
  <div class="card">
    <div class="kpi-label">Surplus over Payments</div>
    <div class="kpi-value c-green">${fmt(Math.max(0, budget - totalStd))}</div>
    <div class="kpi-sub">Mins: ${fmt(totalMin)}${totalStd>totalMin?` · Std: ${fmt(totalStd)}`:''}  </div>
  </div>
  <div class="card">
    <div class="kpi-label">Debt Freedom</div>
    <div class="kpi-value c-green" style="font-size:17px">${dfDate ? dfDate.toLocaleDateString('en-GB',{month:'short',year:'numeric'}) : '—'}</div>
    <div class="kpi-sub">${daysLeft ? daysLeft.toLocaleString()+' days' : ''}</div>
  </div>
</div>

<h3 style="margin-bottom:10px;font-size:14px;letter-spacing:-0.3px">
  Snowball Order
  <span style="font-size:10px;color:var(--text3);font-weight:400"> · smallest first · budget auto-allocated each month</span>
</h3>
<div id="debt-list" style="margin-bottom:14px"></div>

<div class="card" style="margin-bottom:14px">
  <div class="kpi-label" style="margin-bottom:10px">📅 Month-by-Month Allocation</div>
  <div class="snowball-scroll">
    <table class="sch-tbl" id="snowball-table" style="min-width:${cards.length*100+200}px"></table>
  </div>
</div>

<div class="card">
  <div class="kpi-label">📈 Payoff Timeline</div>
  <div class="chart-wrap tall"><canvas id="debt-chart"></canvas></div>
</div>`;

  // ── Card tiles ──
  document.getElementById('debt-list').innerHTML = cards.map((c,i) => {
    const isAttack = i === 0 && cards.filter(x=>x.balance>0).length > 0;
    const clearMo  = clearMonth.hasOwnProperty(c.id) ? clearMonth[c.id] : null;
    const clearDt  = clearMo !== null ? addMonths(today, clearMo+1) : null;

    // This month's allocation from the plan
    const thisMonthAlloc = plan.length ? (plan[0].allocations[c.id] || 0) : 0;

    let dealAlert = '';
    if (c.zeroEndDate){
      const dealEnd    = parseDate(c.zeroEndDate);
      const moToEnd    = Math.max(1, Math.round((dealEnd - today) / 2628000000));
      const required   = +(c.balance / moToEnd).toFixed(2);
      const onTrack    = clearDt && clearDt <= dealEnd;
      const moToClrMin = c.balance > 0 ? Math.ceil(c.balance / (c.minPayment || 10)) : 0;
      const atRiskWithoutSnowball = moToClrMin > moToEnd;
      dealAlert = `<div style="background:var(--surface3);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;margin-top:8px;font-size:11px">
        <div style="font-size:10px;font-weight:700;color:var(--amber);margin-bottom:3px">
          0% ends ${dealEnd.toLocaleDateString('en-GB',{month:'short',year:'numeric'})} · ${moToEnd}mo left
        </div>
        <div>Need <strong class="mono">${fmt(required)}</strong>/mo to clear in time ·
          <span style="color:${onTrack?'var(--green)':'var(--red)'};font-weight:700">
            ${onTrack ? '✅ On track' : '❌ At risk'}
          </span>
        </div>
        ${atRiskWithoutSnowball && onTrack ? `<div style="color:var(--accent);margin-top:3px;font-size:10px">⚡ Snowball reprioritised this card to protect deadline</div>` : ''}
      </div>`;
    }

    return `<div class="sb-card ${isAttack?'attack':''}">
      <div class="sb-name">
        ${isAttack ? '🎯 ' : ''}${c.name}
        ${isAttack ? '<div><span class="badge b-green" style="margin-top:3px;font-size:9px">ATTACK TARGET</span></div>' : ''}
        <div style="font-size:10px;color:var(--text3);margin-top:2px">Due: ${ordinal(c.due)}</div>
      </div>
      <div class="sb-details">
        <div class="mono" style="font-size:15px;color:var(--red);font-weight:600">${fmt(c.balance)}</div>
        <div style="font-size:10px;color:var(--text2);margin-top:2px">
          This month: <strong class="mono">${fmt(thisMonthAlloc)}</strong> · Min: ${fmt(c.minPayment || 10)}${c.standardPayment && c.standardPayment > (c.minPayment||10) ? ` · Std: ${fmt(c.standardPayment)}` : ''}
        </div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">
          ${clearDt ? '🏁 Clear: '+clearDt.toLocaleDateString('en-GB',{month:'short',year:'numeric'})+' ('+clearMo+'mo)' : 'Budget insufficient to clear'}
        </div>
        ${dealAlert}
      </div>
      <div class="sb-actions">
        <button class="btn btn-ghost btn-sm" onclick="openDebtModal('${c.id}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteDebt('${c.id}')">✕</button>
      </div>
    </div>`;
  }).join('');

  // ── Month-by-month allocation table (first 24 months) ──
  const tableMonths = plan.slice(0, 24);

  // cardId → parsed promo end Date (null if no promo)
  const cardPromoEnd = {};
  cards.forEach(c => { cardPromoEnd[c.id] = c.zeroEndDate ? parseDate(c.zeroEndDate) : null; });

  // For a given card and snap.date, is this exactly the promo expiry month?
  const isPromoExpiry = (c, snapDate) => {
    const pe = cardPromoEnd[c.id];
    if (!pe) return false;
    return snapDate.getFullYear() === pe.getFullYear() && snapDate.getMonth() === pe.getMonth();
  };

  // Effective floor per card — mirrors the engine
  const effMin = c => {
    const m = c.minPayment > 0 ? c.minPayment : 10;
    return (c.standardPayment && c.standardPayment > m) ? c.standardPayment : m;
  };

  const tHead = `<thead><tr>
    <th>Month</th>
    ${cards.map(c => {
      const pe = cardPromoEnd[c.id];
      const promoLabel = pe ? `<div style="font-size:8px;color:var(--amber);font-weight:500;margin-top:1px">0% → ${pe.toLocaleDateString('en-GB',{month:'short',year:'2-digit'})}</div>` : '';
      return `<th style="color:var(--red)">${c.name}${promoLabel}</th>`;
    }).join('')}
    <th>Total</th>
    <th>Remaining Debt</th>
  </tr></thead>`;

  const tBody = `<tbody>${tableMonths.map(snap => {
    const totalRem = +Object.values(snap.balances).reduce((a,b)=>a+b,0).toFixed(2);
    const isNow = snap.month === 1;
    return `<tr style="${isNow ? 'background:var(--accent-glow)' : ''}">
      <td class="mono" style="font-weight:${isNow ? 700 : 400}">
        ${snap.date.toLocaleDateString('en-GB',{month:'short',year:'2-digit'})}
        ${isNow ? ' <span class="today-badge">NOW</span>' : ''}
      </td>
      ${cards.map(c => {
        const amt  = snap.allocations[c.id] || 0;
        const bal  = snap.balances[c.id];
        const justCleared  = snap.cleared.includes(c.id);
        const promoExpiry  = isPromoExpiry(c, snap.date);
        // At expiry: did the balance clear in time?
        const promoBreach  = promoExpiry && !justCleared && bal > 0.01;
        const promoSafe    = promoExpiry && (justCleared || bal <= 0.01);

        // Cell background
        const cellBg = promoBreach ? 'background:rgba(255,84,112,0.22);'
                     : promoSafe   ? 'background:rgba(34,212,126,0.18);'
                     : '';

        // Text colour
        const floor = effMin(c);
        const textColor = justCleared || promoSafe
          ? 'var(--green)'
          : promoBreach
            ? 'var(--red)'
            : amt > floor + 0.01
              ? 'var(--green)'
              : amt > 0
                ? 'var(--text)'
                : 'var(--text3)';

        // Label inside the cell
        const promoLabel = promoBreach
          ? '<br><span style="font-size:9px;color:var(--red);font-weight:700">❌ PAST PROMO</span>'
          : promoSafe
            ? '<br><span style="font-size:9px;color:var(--green);font-weight:700">✅ CLEARED</span>'
            : '';

        return `<td class="mono" style="color:${textColor};${cellBg}font-weight:${justCleared || promoExpiry ? 700 : 400}">
          ${amt > 0 ? fmt(amt) : '—'}
          ${justCleared && !promoExpiry ? ' <span style="font-size:9px;color:var(--green)">✓ CLEAR</span>' : ''}
          ${promoLabel}
        </td>`;
      }).join('')}
      <td class="mono" style="font-weight:600">${fmt(snap.budgetUsed)}</td>
      <td class="mono" style="color:${totalRem < totalDebt*0.5 ? 'var(--green)' : totalRem < totalDebt*0.8 ? 'var(--amber)' : 'var(--red)'}">${fmt(totalRem)}</td>
    </tr>`;
  }).join('')}</tbody>`;

  document.getElementById('snowball-table').innerHTML = tHead + tBody;

  // ── Chart — stacked bar per card ──
  const chartMonths = plan.slice(0, Math.min(plan.length, 60));
  const chartLabels = chartMonths.map(s => s.date.toLocaleDateString('en-GB',{month:'short',year:'2-digit'}));
  const cardColors  = ['rgba(255,84,112,0.7)','rgba(240,167,50,0.7)','rgba(79,142,247,0.7)','rgba(160,124,255,0.7)','rgba(34,212,126,0.7)','rgba(255,150,80,0.7)'];

  const datasets = cards.map((c,i) => ({
    label: c.name,
    data: chartMonths.map(s => +(s.balances[c.id]||0).toFixed(2)),
    backgroundColor: cardColors[i % cardColors.length],
    borderRadius: 2,
    borderSkipped: false,
  }));

  if (charts.debt) charts.debt.destroy();
  charts.debt = new Chart(document.getElementById('debt-chart').getContext('2d'), {
    type: 'bar',
    data: { labels: chartLabels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: true, position: 'bottom', labels:{ boxWidth:10, font:{size:10}, color:cssVar('--chart-tick'), padding:10 } },
        tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${fmt(ctx.raw)}` } }
      },
      scales: {
        x: { stacked:true, grid:{color:cssVar('--chart-grid')}, ticks:{color:cssVar('--chart-tick'),font:{size:9},maxTicksLimit:18} },
        y: { stacked:true, grid:{color:cssVar('--chart-grid')}, ticks:{color:cssVar('--chart-tick'),font:{size:9},callback:v=>v>=1000?'£'+Math.round(v/1000)+'k':fmt(v)} }
      }
    }
  });
}

function saveDebtCard(editId){
  const name       = document.getElementById('dc-name').value.trim();
  const balance    = parseFloat(document.getElementById('dc-balance').value);
  const due        = parseInt(document.getElementById('dc-due').value) || 1;
  const minPayment      = parseFloat(document.getElementById('dc-min').value) || 10;
  const standardPayment = parseFloat(document.getElementById('dc-std').value) || 0;
  const zeroEndDate= document.getElementById('dc-zero').value || null;
  const apr        = parseFloat(document.getElementById('dc-apr').value) || 0;
  if (!name || isNaN(balance)) return alert('Enter card name and balance.');
  const payment = standardPayment > minPayment ? standardPayment : minPayment;
  const obj = {id:editId||uid(), name, balance, due, payment, minPayment, standardPayment: standardPayment > minPayment ? standardPayment : 0, apr, zeroEndDate};
  if (editId){ const i=S.debtCards.findIndex(d=>d.id===editId); if(i>=0) S.debtCards[i]=obj; }
  else S.debtCards.push(obj);
  save(); closeModal(); renderDebt();
}

/* ── DATA BACKUP / RESTORE ── */
function exportData(){
  const blob = new Blob([JSON.stringify(S, null, 2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `fcc_backup_${fmtDate(today)}.json`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function importData(input){
  const file = input.files[0]; if (!file) return; input.value = '';
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.transactions && !data.savingsPots && !data.debtCards)
        return alert('This doesn\'t look like a valid FCC backup file.');
      if (!confirm('This will replace ALL your current data with the backup. Continue?')) return;
      Object.keys(S).forEach(k => delete S[k]);
      Object.assign(S, { ...JSON.parse(JSON.stringify(DEFAULT_STATE)), ...data });
      // Re-run migrations
      S.savingsPots.forEach(p => {
        if (!p.anchorDate) p.anchorDate = fmtDate(today);
        if (!p.withdrawals) p.withdrawals = [];
        if (!p.hasOwnProperty('interestRate')) p.interestRate = 0;
      });
      if (!S.settings) S.settings = { notificationsEnabled:false, interestModellingEnabled:false };
      if (!S.debtStrategy) S.debtStrategy = 'snowball';
      save(); invalidateFlow(); cfPage = 0;
      renderAll();
      alert('✅ Backup restored successfully!');
    } catch(err){ alert('Import failed: ' + err.message); }
  };
  reader.readAsText(file);
}

/* ── NOTIFICATIONS ── */
async function requestNotifPermission(){
  if (!('Notification' in window)) return;
  const result = await Notification.requestPermission();
  if (result === 'granted') scheduleNotifications();
  renderSettings();
}

function testNotification(){
  if (Notification.permission !== 'granted') return alert('Please grant notification permission first.');
  new Notification('FCC Reminder 🏦', { body: 'Test notification from Financial Command Centre!', icon: '' });
}

function scheduleNotifications(){
  if (!S.settings.notificationsEnabled || Notification.permission !== 'granted') return;
  // Build upcoming alerts
  const alerts = [];
  const flow = getFlow();

  // Payday in next 3 days
  const nextPayday = getNextPayday();
  if (nextPayday){
    const d = Math.ceil((nextPayday - today) / 86400000);
    if (d <= 3 && d >= 0) alerts.push({ title:'💰 Payday soon!', body:`Payday is ${d===0?'today':d===1?'tomorrow':'in '+d+' days'} — ${fmt(S.transactions.find(t=>t.type==='moneyIn'&&t.freq==='lastwd')?.amount||0)} incoming.` });
  }

  // 0% deals expiring within 60 days
  S.debtCards.forEach(c => {
    if (!c.zeroEndDate) return;
    const end = parseDate(c.zeroEndDate);
    const days = Math.ceil((end - today) / 86400000);
    if (days > 0 && days <= 60) alerts.push({ title:`⚠️ 0% deal expiring: ${c.name}`, body:`${c.name} 0% deal ends in ${days} days (${end.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}). Balance: ${fmt(c.balance)}` });
  });

  // Bills due in next 3 days
  S.bills.forEach(b => {
    if (!b.due) return;
    const thisMonth = new Date(today.getFullYear(), today.getMonth(), b.due);
    const days = Math.ceil((thisMonth - today) / 86400000);
    if (days >= 0 && days <= 3) alerts.push({ title:`📋 Bill due: ${b.name}`, body:`${b.name} — ${fmt(b.amount)} due ${days===0?'today':days===1?'tomorrow':'in '+days+' days'}.` });
  });

  // Show alerts (staggered slightly so they don't all fire at once)
  alerts.forEach((a, i) => {
    setTimeout(() => {
      if (Notification.permission === 'granted') new Notification(a.title, { body: a.body });
    }, i * 2000);
  });

  if (alerts.length === 0 && Notification.permission === 'granted'){
    new Notification('FCC ✅', { body: 'No urgent reminders right now — you\'re on track!' });
  }
}

let _onboardStep = 0;

function startOnboarding(){
  _onboardStep = 0;
  document.getElementById('onboarding-overlay').style.display = 'block';
  renderOnboardStep();
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
}

function renderOnboardStep(){
  const step  = ONBOARD_STEPS[_onboardStep];
  const total = ONBOARD_STEPS.length;

  document.getElementById('onboard-progress').innerHTML = ONBOARD_STEPS.map((_,i) =>
    `<div class="onboard-pip ${i<_onboardStep?'done':i===_onboardStep?'active':''}"></div>`
  ).join('');

  const isFirst = _onboardStep === 0;
  const isLast  = _onboardStep === total - 1;

  document.getElementById('onboard-steps').innerHTML = `
    <div class="card">
      <div style="font-size:${step.isWelcome?'20':'17'}px;font-weight:700;margin-bottom:${step.isWelcome?'4':'6'}px;letter-spacing:-0.3px">${step.title}</div>
      ${step.hint ? `<div style="font-size:12px;color:var(--text2);margin-bottom:14px">${step.hint}</div>` : ''}
      ${step.render()}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:20px;gap:8px;flex-wrap:wrap">
        ${!isFirst ? `<button class="btn btn-ghost btn-sm" onclick="onboardSkip()">${isLast?'Skip':'Skip this step'}</button>` : `<div></div>`}
        <div style="display:flex;gap:8px">
          ${_onboardStep>0?`<button class="btn btn-ghost" onclick="onboardBack()">← Back</button>`:''}
          <button class="btn btn-primary" onclick="onboardNext()">${isLast?'Finish 🎉':isFirst?'Get Started →':'Next →'}</button>
        </div>
      </div>
    </div>`;

  const freqSel = document.getElementById('inc-freq');
  if (freqSel){
    const domWrap = document.getElementById('inc-dom-wrap');
    freqSel.addEventListener('change', () => {
      domWrap.style.display = freqSel.value==='monthly'?'block':'none';
    });
    // Set initial state
    domWrap.style.display = freqSel.value==='monthly'?'block':'none';
  }
}

function onboardNext(){
  ONBOARD_STEPS[_onboardStep].save();
  if (_onboardStep === ONBOARD_STEPS.length - 1){ finishOnboarding(); return; }
  _onboardStep++;
  renderOnboardStep();
}
function onboardSkip(){
  if (_onboardStep === ONBOARD_STEPS.length - 1){ finishOnboarding(); return; }
  _onboardStep++;
  renderOnboardStep();
}
function onboardBack(){
  if (_onboardStep > 0){ _onboardStep--; renderOnboardStep(); }
}
function finishOnboarding(){
  S.settings = S.settings || {};
  S.settings.onboardingComplete = true;
  save(); invalidateFlow();
  document.getElementById('onboarding-overlay').style.display = 'none';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-dashboard').classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('[data-page="dashboard"]').classList.add('active');
  renderDashboard();
  if (S.settings?.notificationsEnabled) scheduleNotifications();
}

  const name = document.getElementById('bill-name').value.trim();

  const due = parseInt(document.getElementById('bill-due').value) || null;

  save(); closeModal(); renderBills();

  openModal(`<h3>${e?'Edit':'Log'} Transaction</h3>
    <div class="fr">
      <div class="fg"><label>Date</label><input type="date" id="sp-date" value="${e?e.date:fmtDate(today)}"></div>
      <div class="fg"><label>Amount (£)</label><input type="number" id="sp-amount" value="${e?e.amount:''}" step="0.01" inputmode="decimal" autofocus></div>
    </div>
    <div class="fg"><label>Description</label><input id="sp-desc" value="${e?e.desc:''}"></div>
    <div class="fg"><label>Category</label><select id="sp-cat">${['Groceries','Dining Out','Transport','Entertainment','Clothing','Health','Subscriptions','Other'].map(c=>`<option ${e?.category===c?'selected':''}>${c}</option>`).join('')}</select></div>
    <div class="form-actions"><button class="btn btn-primary" onclick="saveSpend('${editId||''}')">Save</button><button class="btn btn-ghost" onclick="closeModal()">Cancel</button></div>`);
}
function saveSpend(editId){
  const date = document.getElementById('sp-date').value;
  const amount = parseFloat(document.getElementById('sp-amount').value);
  const desc = document.getElementById('sp-desc').value.trim();
  const category = document.getElementById('sp-cat').value;
  if (!date || isNaN(amount) || amount<=0) return;
  const obj = {id:editId||uid(), date, amount, desc, category};
  if (editId){ const i=S.spending.findIndex(x=>x.id===editId); if(i>=0) S.spending[i]=obj; }
  else { S.spending.push(obj); S.spending.sort((a,b)=>b.date.localeCompare(a.date)); }
  save(); closeModal(); renderSpending();
}
function deleteSpend(id){ S.spending=S.spending.filter(e=>e.id!==id); save(); renderSpending(); }

/* ==========================================================================
   BUDGET
   ========================================================================== */
function renderBudget(){
  const el = document.getElementById('page-budget');
  const curKey = fmtDate(today).slice(0,7);
  const thisMonth = S.spending.filter(s => s.date.startsWith(curKey));
  const catActuals = {};
  thisMonth.forEach(s => { catActuals[s.category]=(catActuals[s.category]||0)+s.amount; });
  let totalBudgeted=0, totalActual=0;
  Object.values(S.budget).forEach(v=>{ totalBudgeted+=v.budgeted||0; totalActual+=v.actual||0; });

  el.innerHTML = `
<div class="sh"><div><h2>🎯 Budget</h2><p>Monthly targets vs actuals</p></div>
<button class="btn btn-primary btn-sm" onclick="openBudgetCatModal()">＋ Add Category</button></div>
<div class="g3" style="margin-bottom:14px">
  <div class="card"><div class="kpi-label">Budgeted</div><div class="kpi-value">${fmt(totalBudgeted)}</div></div>
  <div class="card"><div class="kpi-label">Actual</div><div class="kpi-value">${fmt(totalActual)}</div></div>
  <div class="card"><div class="kpi-label">Remaining</div><div class="kpi-value ${totalBudgeted-totalActual>=0?'c-green':'c-red'}">${fmts(totalBudgeted-totalActual)}</div></div>
</div>
<div class="card">${Object.entries(S.budget).map(([k,v]) => {
  const spendActual = catActuals[k] || 0;
  const actual = v.actual || spendActual;
  const diff = v.budgeted - actual;
  const pct = v.budgeted > 0 ? Math.min(actual/v.budgeted*100, 100) : 0;
  return `<div class="bcat-row">
    <div class="bcat-name">${k}</div>
    <div class="bcat-bars">
      <div class="prog-bg"><div class="prog-fill" style="width:${pct.toFixed(0)}%;background:${pct>100?'var(--red)':pct>80?'var(--amber)':'var(--green)'}"></div></div>
      <div style="font-size:9px;color:var(--text3);margin-top:2px">${pct.toFixed(0)}% of budget</div>
    </div>
    <div class="bcat-vals">
      <span style="color:var(--text2)">${fmt(v.budgeted||0)}</span>
      <span><input type="number" step="0.01" inputmode="decimal" value="${actual}" style="width:80px;padding:4px 6px;font-size:11px" onchange="updateBudgetActual('${k}',this.value)"></span>
      <span class="${diff>=0?'c-green':'c-red'}">${fmts(diff)}</span>
    </div>
  </div>`;
}).join('')}</div>`;
}
function updateBudgetActual(key,val){ if(S.budget[key]) S.budget[key].actual=parseFloat(val)||0; save(); }
function openBudgetCatModal(){
  openModal(`<h3>Add Budget Category</h3>
    <div class="fg"><label>Name</label><input id="bc-name" autofocus></div>
    <div class="fg"><label>Monthly Budget (£)</label><input type="number" id="bc-budget" step="0.01" inputmode="decimal"></div>
    <div class="form-actions"><button class="btn btn-primary" onclick="saveBudgetCat()">Add</button><button class="btn btn-ghost" onclick="closeModal()">Cancel</button></div>`);
}
function saveBudgetCat(){
  const name = document.getElementById('bc-name').value.trim();
  const budget = parseFloat(document.getElementById('bc-budget').value) || 0;
  if (!name) return;
  S.budget[name] = {budgeted:budget, actual:0};
  save(); closeModal(); renderBudget();
}

/* ==========================================================================
   RESET
   ========================================================================== */
function resetToDefaults(){
  if (!confirm('Wipe ALL data and start completely blank?')) return;
  try { localStorage.clear(); } catch(e){}
  const blank = JSON.parse(JSON.stringify(DEFAULT_STATE));
  Object.keys(S).forEach(k => delete S[k]);
  Object.assign(S, blank);
  invalidateFlow();
  cfPage = 0;
  // Clear Firebase too
  if (_currentUser){
    db.collection('users').doc(_currentUser.uid).delete().catch(()=>{});
  }
  renderDashboard();
  alert('✅ All data wiped. App is now blank.');
}

/* INIT */

const THEME_KEY = 'fcc_theme';
function applyTheme(theme, persist){
  if(theme === 'light'){ document.documentElement.classList.add('light'); document.getElementById('theme-toggle').textContent = '🌙'; }
  else { document.documentElement.classList.remove('light'); document.getElementById('theme-toggle').textContent = '☀️'; }
  // Always persist to localStorage immediately
  try { localStorage.setItem(THEME_KEY, theme); } catch(e){}
  if(persist){
    // Write theme to its own Firebase path (bypasses debounce — immediate write)
    if(_firebaseReady && _fbUser){
      try { _fbDb.ref(userDbPath() + '_theme').set(theme); } catch(e){}
    }
    // Also keep it in S.settings as a backup
    if(typeof S !== 'undefined' && S.settings){
      S.settings.theme = theme;
      save();
    }
  }
}
function toggleTheme(){
  const isLight = document.documentElement.classList.contains('light');
  applyTheme(isLight ? 'dark' : 'light', true);
  renderSettings(); // refresh settings page if open
}
try { const saved = localStorage.getItem(THEME_KEY); if(saved) applyTheme(saved, false); } catch(e){}

cfPage = 0;
// Set version badge in topbar
try { const vb = document.getElementById('version-badge'); if(vb) vb.textContent = FCC_VERSION; } catch(e){}

// Check if Firebase has been configured (placeholder values = not yet set up)
const firebaseConfigured = FIREBASE_CONFIG.apiKey !== 'YOUR_API_KEY';

if (firebaseConfigured){
  // Full Firebase mode — show auth overlay, load from cloud
  initFirebase();
} else {
  // Firebase not yet configured — fall back to localStorage silently
  console.warn('Firebase not configured — using localStorage. See FIREBASE_CONFIG in the code.');
  loadFromLocalStorage();
  startApp();
}
</script>
